<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Unlock PDF – DevToolkit</title>

  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/pdf-tools.css">
</head>
<body>

<header class="site-header">
  <div class="header-container">
    <h1 class="logo">DevToolkit</h1>
  </div>
</header>

<main class="main-content">

  <section class="tool-hero">
    <h1>Unlock PDF</h1>
    <p>Remove password protection from your PDF file.</p>
  </section>

  <section class="tool-box">
    <input type="file" accept="application/pdf"
           onchange="handlePdfSelection(this)">

    <input type="password" id="password"
           placeholder="Enter password (if required)">

    <div class="tool-actions">
      <button id="unlockBtn" onclick="unlockPDF()">Unlock PDF</button>
      <button id="downloadBtn" onclick="downloadPdf('unlocked.pdf')" disabled>
        Download
      </button>
    </div>

    <div id="status" class="tool-status"></div>
  </section>

</main>

<footer class="site-footer">
  <p>© 2026 DevToolkit • Privacy-first browser tools</p>
</footer>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="../../assets/js/pdf-tools.js">
</script>
<script>
   </script>
<script src="../../assets/js/analytics.js" defer></script>
</body>
</html>
