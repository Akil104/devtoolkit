<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Image to Base64 – DevToolkit</title>

  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/image-tools.css">
</head>
<body>

<header class="site-header">
  <div class="header-container">
    <h1 class="logo">DevToolkit</h1>
  </div>
</header>

<main class="main-content">
  <section class="tool-hero">
    <h1>Image to Base64</h1>
    <p>Convert images to Base64 strings.</p>
  </section>

  <section class="tool-box">
    <input type="file" accept="image/*" onchange="loadImage(this, 'preview')" />
    <img id="preview" class="image-preview" />

    <div class="tool-actions">
      <button onclick="imageToBase64('base64Output')">Convert</button>
    </div>

    <textarea id="base64Output" readonly></textarea>
  </section>
</main>

<footer class="site-footer">
  <p>© 2026 DevToolkit • Privacy-first browser tools</p>
</footer>

<script src="../../assets/js/image-tools.js"></script>
<script>
  </script>
<script src="../../assets/js/analytics.js" defer></script>
</body>
</html>
